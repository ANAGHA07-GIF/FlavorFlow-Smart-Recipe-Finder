<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="loginbox">

                <h2 class="text-center mb-4">
                    Login
                </h2>

                <input type="text" class="form-control mb-3" placeholder="Enter Username" id="username">


                <input type="password" class="form-control mb-3" placeholder="Enter Password" id="pass">

                <button class="btn btn-dark w-100" onclick="loginUser()">
                    Login
                </button>

                <p class="text-center mt-3">
                    New User?
                    <a href="signup.html">Signup</a>
                </p>

            </div>

        </div>

    </div>

</div>

<script>

function loginUser(){

var username =
document.getElementById("username").value

var pass =
document.getElementById("pass").value

if(username == "" || pass == ""){

alert("Fill all fields")

return

}

let users = JSON.parse(
localStorage.getItem("users")
) || []

const validUser = users.find(user =>

user.username === username &&
user.pass === pass

)

if(validUser){

alert("Login Successful ✅")

localStorage.setItem(
"loggedInUser",
JSON.stringify(validUser)
)

window.location =
"search.html"

}

else{

alert(
"Invalid Username or Password ❌"
)

}

}
</script>
