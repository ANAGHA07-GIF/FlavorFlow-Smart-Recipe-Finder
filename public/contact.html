<!-- Contact Section -->

<div class="container mt-5">

<div class="glass-card p-5">

<h1 class="text-center mb-5">
Get In Touch 🌿
</h1>

<form onsubmit="sendMessage(event)">

<div class="mb-4">

<label class="form-label fs-5">

Full Name

</label>

<input
id="name"
type="text"
class="form-control"
placeholder="Enter your name"
required
>

</div>

<div class="mb-4">

<label class="form-label fs-5">

Email Address

</label>

<input
type="email"
class="form-control"
placeholder="Enter your email"
required
>

</div>

<div class="mb-4">

<label class="form-label fs-5">

Message

</label>

<textarea
class="form-control"
id="message"
rows="5"
placeholder="Enter your message"
required
></textarea>

</div>

<div class="text-center">

<button
class="btn-green"
type="submit"
>

Send Message

</button>

</div>

</form>
