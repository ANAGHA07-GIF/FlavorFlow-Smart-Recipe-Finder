<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

  <!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS Animation Framework -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- Custom CSS -->
<link rel="stylesheet" href="style2.css">
</head>
<body>
<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark p-3">
<div class="container">
<a href="index.html" class="navbar-brand fw-bold">👨‍💼 Admin Panel</a>
  <div class="d-flex gap-2 flex-wrap justify-content-center mt-3 mt-lg-0"></div>
  <a href="admin.html" class="btn btn-warning">Dashboard</a>
  <a href="add-recipe.html" class="btn btn-warning">Add Recipe</a>
  <a href="manage-recipes.html" class="btn btn-warning">Manage Recipes</a>
  <a href="calories.html" class="btn btn-warning">Calories</a>
  <a href="index.html" class="btn btn-warning">Home</a>
  </div>
</div>
</nav>

<!-- Dashboard -->
<div class="container mt-5">
<h1 class="text-center mb-5 fw-bold" data-aos="fade-down">Admin Dashboard ⚙️</h1>
  <div class="row g-4">
  <!-- Recipes -->
    <div class="col-lg-4 col-md-6"data-aos="fade-up">
      <div class="card shadow text-center p-4 h-100">
      <h2>🍳 Recipes</h2>
      <h1 id="recipeCount">0</h1>
      </div>
    </div>
  <!-- Calories -->
    <div  class="col-lg-4 col-md-6" data-aos="zoom-in">
      <div class="card shadow text-center p-4 h-100">
      <h2>🔥 Calories</h2>
      <h1 id="calorieCount">0</h1>
      </div>
    </div>
  <!-- Users -->
    <div class="col-lg-4 col-md-6" data-aos="fade-left">
      <div class="card shadow text-center p-4 h-100">
      <h2>👤 Users</h2>
      <h1 id="userCount">0</h1>
      </div>
    </div>
</div>
<!-- Extra Section -->
  <div class="card shadow p-4 mt-5" data-aos="flip-up">
  <h3 class="mb-3">📋 Admin Features</h3>
  <ul class="fs-5">
  <li>Add new recipes</li>
  <li>Manage recipe details</li>
  <li>Calculate total calories</li>
  <li>View dynamic recipe data</li>
  </ul>
  </div>
  <!-- Contact Messages -->

<div class="card shadow p-4 mt-5">

<h3 class="mb-4">
💌 User Messages
</h3>

<div id="messageContainer">

<p class="text-muted">
No Messages Yet
</p>

</div>

</div>
</div>
<!-- AOS Script -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init()
</script>
<!-- Custom JS -->
<script src="script2.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
