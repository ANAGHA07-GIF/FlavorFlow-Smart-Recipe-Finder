<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="profilebox">

                <h2 class="mb-4">
                    User Profile
                </h2>

                <input type="text" class="form-control mb-3" placeholder="Enter Name" id="pname">

                <input type="email" class="form-control mb-3" placeholder="Enter Email" id="pemail">

                <input type="number" class="form-control mb-3" placeholder="Enter Age" id="page">

                <input type="text" class="form-control mb-3" placeholder="Favorite Food">

                <button class="btn btn-success w-100" onclick="saveProfile()">
                    Save Profile
                </button>

            </div>

        </div>

    </div>

</div>

<script>

function saveProfile(){

    var name = document.getElementById("pname").value

    var email = document.getElementById("pemail").value

    var age = document.getElementById("page").value

    if(name == "" || email == "" || age == ""){

        alert("Fill all fields")

    }

    else{

        alert("Profile Saved")

    }

}
window.onload = function(){

const user = JSON.parse(
localStorage.getItem("user")
)

if(user){

document.getElementById("pname").value =
user.name

document.getElementById("pemail").value =
user.email

}

}

</script>
