<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition Calculator</title>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- AOS -->
<link  href="https://unpkg.com/aos@2.3.1/dist/aos.css"rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" href="style2.css">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark p-3">
<div class="container">
<a href="admin.html" class="navbar-brand fw-bold">🔥 Nutrition Calculator</a>
  <div class="d-flex gap-2 flex-wrap">
  <a href="admin.html" class="btn btn-warning">Dashboard</a>
  <a href="add-recipe.html" class="btn btn-warning">Add Recipe</a>
  <a href="manage-recipes.html" class="btn btn-warning">Manage Recipes</a>
  <a href="index.html" class="btn btn-warning">Home</a>
  </div>
</div>
</nav>
<!-- Main Section -->
<div class="container mt-5">
<h1 class="text-center fw-bold mb-5" data-aos="fade-down">Nutrition Calculator 🥗</h1>
  <div class="row g-4">
  <!-- Calculator -->
    <div class="col-lg-6" data-aos="fade-right">
      <div class="card shadow p-5 h-100">
      <h2 class="mb-4">🍔 Calculate Calories</h2>
      <input type="text" id="foodName" placeholder="Food Name" class="form-control mb-3">
      <input type="number" id="foodCalories" placeholder="Calories Per Serving" class="form-control mb-3">
      <input  type="number" id="foodQuantity" placeholder="Quantity"  class="form-control mb-4">
      <button class="btn btn-dark w-100" onclick="calculateCalories()">Calculate</button>
        <div class="text-center mt-4">
        <h3 id="totalCalories">Total Calories: 0</h3>
        </div>
      </div>
    </div>
  <!-- Tips -->
  <div class="col-lg-6" data-aos="fade-left">
    <div class="card shadow p-5 h-100">
    <h2 class="mb-4">💡 Healthy Food Tips</h2>
    <ul class="fs-5">
    <li>Eat more vegetables 🥦</li>
    <li>Drink enough water 💧</li>
    <li>Avoid too much junk food 🍟</li>
    <li>Balance proteins and carbs 🍗</li>
    <li>Exercise regularly 🏃</li>
    </ul>
    </div>
  </div>
</div>
<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init()
</script>
<!-- Custom JS -->
<script src="script2.js"></script>
</body>
</html>
