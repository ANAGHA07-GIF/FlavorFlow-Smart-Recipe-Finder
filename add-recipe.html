<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Recipe</title>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" href="style2.css">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark p-3">
<div class="container">
<a href="admin.html"  class="navbar-brand fw-bold">👨‍🍳 Add Recipe</a>
  <div class="d-flex gap-2 flex-wrap">
  <a  href="admin.html" class="btn btn-warning">Dashboard</a>
  <a  href="manage-recipes.html"  class="btn btn-warning">Manage Recipes</a>
  <a  href="calories.html" class="btn btn-warning">Calories</a>
  </div>
</div>
</nav>
<!-- Form -->
<div class="container mt-5">
  <div class="card shadow p-5" data-aos="fade-up">
  <h1 class="text-center mb-4">Add Recipe 👨‍🍳</h1>
  <form onsubmit="addRecipe(event)">
  <!-- Recipe Name -->
  <input  type="text" id="recipeName" placeholder="Recipe Name" class="form-control mb-3"required>
  <!-- Ingredients -->
  <input  type="text" id="ingredients"placeholder="Ingredients (comma separated)" class="form-control mb-3"required>
  <!-- Category -->
  <select id="category" class="form-control mb-3" required>
  <option value="">Select Category</option>
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Desserts</option>
  </select>
  <!-- Food Type -->
    <div class="mb-3">
    <label class="form-label fw-bold">Food Type</label>
    <br>
    <input  type="radio"  name="foodType" value="Veg" required>Veg
    <input  type="radio" name="foodType" value="Non Veg" class="ms-3">Non Veg
    </div>
  <!-- Calories -->
  <input type="number" id="calories" placeholder="Calories" class="form-control mb-3" required>
  <!-- Date -->
  <input type="date" class="form-control mb-3">
  <!-- File Upload -->
  <input type="file" class="form-control mb-3">
  <!-- Steps -->
  <textarea id="steps" placeholder="Preparation Steps" class="form-control mb-3" rows="5" required></textarea>
  <!-- Image URL -->
  <input type="text" id="image" placeholder="Image URL" class="form-control mb-3" required>
  <!-- Checkbox -->
    <div class="mb-3">
    <input type="checkbox" required>I confirm recipe details are correct
    </div>
  <!-- Submit -->
  <button class="btn btn-dark w-100" type="submit">Add Recipe</button>
  </form>
  </div>
</div>

<!-- AOS Script -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init()
  </script>
<!-- Custom JS -->
<script src="script2.js"></script>
</body>
</html>
