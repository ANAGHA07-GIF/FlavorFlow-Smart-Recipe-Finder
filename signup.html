<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="signupbox">

                <h2 class="text-center mb-4">
                    Signup
                </h2>

                <input type="text" class="form-control mb-3" placeholder="Enter Username" id="username">

                <input type="email" class="form-control mb-3" placeholder="Enter Email" id="email">

                <input type="password" class="form-control mb-3" placeholder="Enter Password" id="pass">

                <button class="btn btn-warning w-100" onclick="signupUser()">
                    Signup
                </button>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </div>

        </div>

    </div>

</div>

<script>

function signupUser(){

var username =
document.getElementById("username").value

var email =
document.getElementById("email").value

var pass =
document.getElementById("pass").value

if(
username == "" ||
email == "" ||
pass == ""
){

alert("Fill all fields")

return

}

let users = JSON.parse(
localStorage.getItem("users")
) || []

const userExists = users.find(user =>

user.username === username

)

if(userExists){

alert("Username already exists ❌")

return

}

const newUser = {

username,
email,
pass

}

users.push(newUser)

localStorage.setItem(
"users",
JSON.stringify(users)
)

alert("Signup Successful ✅")

window.location = "profile.html"

}

</script>
